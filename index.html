<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h2>Discover Your Journey</h2>
        <p class="subtitle">Enter your birthdate to see your time on Earth.</p>
        
        <div class="input-group">
            <input type="date" id="birthdate" required>
            <button id="calculate-btn">Calculate</button>
        </div>

        <div class="results-container" id="results">
            <div class="result-box"><span id="years">-</span> Years</div>
            <div class="result-box"><span id="months">-</span> Months</div>
            <div class="result-box"><span id="days">-</span> Days</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
